<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración Inicial SECRETARIA DE SALUD (Supabase)</title>
    <style>
        body { font-family: sans-serif; padding: 40px; line-height: 1.6; }
        .success { color: green; font-weight: bold; }
        .error { color: red; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>🚀 Configuración Inicial (Migración Supabase)</h1>
    <button id="btn-clear" style="padding: 10px; background: #ef4444; color: white; border: none; cursor: pointer;">🗑️ BORRAR DATOS EN SUPABASE</button>
    <div id="status">Iniciando procesos...</div>

    <script type="module">
        import { supabase } from './supabase-config.js';

        const status = document.getElementById('status');
        const btnClear = document.getElementById('btn-clear');

        btnClear.onclick = async () => {
            if (!confirm("¿Seguro que quieres borrar todos los casos de prueba en Supabase?")) return;
            status.innerHTML = "🗑️ Borrando datos antigos en Supabase...";
            
            const { error } = await supabase
                .from('salud_responses')
                .delete()
                .eq('source', 'test_seed');
            
            if (error) {
                status.innerHTML = `<span class="error">❌ ERROR: ${error.message}</span>`;
            } else {
                status.innerHTML = "✅ Datos de prueba borrados de Supabase. Recargando...";
                setTimeout(() => location.reload(), 1500);
            }
        };

        async function runSetup() {
            try {
                status.innerHTML = "Cargando 50 casos de prueba en Supabase...";
                const names = ["Juan", "Maria", "Carlos", "Ana", "Luis", "Elena", "Pedro", "Sofia", "Miguel", "Lucia"];
                const ages = ["12-14", "15-17", "18-21", "22-25", "26-29"];
                const genders = ["mujer", "hombre", "no-binario", "otro"];
                const CP_PREFIXES = ["010", "045", "066", "110", "200", "290", "300", "441", "450", "500", "550", "640", "720", "760", "800", "970"];

                async function getRandomCP() {
                    const prefix = CP_PREFIXES[Math.floor(Math.random() * CP_PREFIXES.length)];
                    try {
                        const res = await fetch(`./public/api/cp/${prefix}.json`);
                        if (!res.ok) return null;
                        const data = await res.json();
                        const cps = Object.values(data);
                        return cps[Math.floor(Math.random() * cps.length)];
                    } catch (e) { return null; }
                }

                const testData = [];
                for (let i = 0; i < 50; i++) {
                    const cpData = await getRandomCP();
                    if (!cpData) continue;

                    const suicide = Math.random() > 0.85;
                    const k10 = suicide ? (Math.floor(Math.random() * 21) + 30) : (Math.floor(Math.random() * 41) + 10);
                    let phq = 0;
                    if (suicide) phq = 24;
                    else phq = Math.floor(Math.random() * 25);

                    testData.push({
                        name: names[Math.floor(Math.random() * names.length)] + " (S)",
                        age_range: ages[Math.floor(Math.random() * ages.length)],
                        gender: genders[Math.floor(Math.random() * genders.length)],
                        estado: cpData.estado,
                        municipio: cpData.municipio,
                        codigo_postal: cpData.cp,
                        colonia: cpData.colonias[0],
                        tipo_ubicacion: 'cp',
                        k10_score: k10,
                        phq9_score: phq,
                        suicide_flag: suicide,
                        coords: cpData.coords,
                        source: 'test_seed'
                    });
                }

                const { error } = await supabase
                    .from('salud_responses')
                    .insert(testData);

                if (error) throw error;
                
                status.innerHTML = ' <span class="success">✓ 50 CASOS CARGADOS EN SUPABASE</span>';
                status.innerHTML += "<br><br><b>¡MIGRACIÓN COMPLETADA!</b> Ya puedes entrar al Dashboard.";
                
            } catch (err) {
                status.innerHTML += ` <span class="error">❌ ERROR: ${err.message}</span>`;
                console.error(err);
            }
        }

        runSetup();
    </script>
</body>
</html>
