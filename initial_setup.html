<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración Inicial CONASAMA</title>
    <style>
        body { font-family: sans-serif; padding: 40px; line-height: 1.6; }
        .success { color: green; font-weight: bold; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🚀 Configuración Inicial del Sistema</h1>
    <div id="status">Iniciando procesos...</div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const status = document.getElementById('status');

        async function runSetup() {
            try {
                // 1. Crear Admin Maestro
                status.innerHTML += "<br>Creando Admin Maestro (admin@conasama.gob.mx)...";
                const userCredential = await createUserWithEmailAndPassword(auth, "admin@conasama.gob.mx", "Conasama2026!");
                const uid = userCredential.user.uid;

                await setDoc(doc(db, "admins", uid), {
                    email: "admin@conasama.gob.mx",
                    role: "master",
                    name: "Administrador Maestro",
                    regions: ["CDMX", "EDOMEX", "JAL"] // El maestro ve todo, pero esto es por estructura
                });
                status.innerHTML += ' <span class="success">✓ CREADO</span>';

                // 2. Cargar 50 casos de prueba
                status.innerHTML += "<br>Cargando 50 casos de prueba en Firestore...";
                const names = ["Juan", "Maria", "Carlos", "Ana", "Luis", "Elena", "Pedro", "Sofia", "Miguel", "Lucia"];
                const states = ["CDMX", "EDOMEX", "JAL"];
                const municipalities = {
                    "CDMX": ["Iztapalapa", "Benito Juarez", "Coyoacan"],
                    "EDOMEX": ["Ecatepec", "Toluca", "Naucalpan"],
                    "JAL": ["Guadalajara", "Zapopan", "Tlaquepaque"]
                };

                for (let i = 0; i < 50; i++) {
                    const state = states[Math.floor(Math.random() * states.length)];
                    const mun = municipalities[state][Math.floor(Math.random() * municipalities[state].length)];
                    await addDoc(collection(db, "conasama_responses"), {
                        name: names[Math.floor(Math.random() * names.length)] + " (Prueba)",
                        ageRange: "18-21",
                        gender: "otro",
                        state: state,
                        municipality: mun,
                        k10Score: Math.floor(Math.random() * 25) + 5,
                        phq9Score: Math.floor(Math.random() * 9),
                        suicideFlag: Math.random() > 0.9,
                        source: 'test_seed',
                        timestamp: serverTimestamp()
                    });
                }
                status.innerHTML += ' <span class="success">✓ CARGADOS</span>';
                status.innerHTML += "<br><br><b>¡PROCESO COMPLETADO!</b> Puedes cerrar esta ventana y loguearte en login.html";
                
            } catch (err) {
                status.innerHTML += ` <span class="error">❌ ERROR: ${err.message}</span>`;
                console.error(err);
            }
        }

        runSetup();
    </script>
</body>
</html>
