<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CONASAMA | Estadísticas de Salud Mental</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>

<body class="dashboard-body light-theme">
    <div class="glow-bg"></div>

    <main class="orion-layout">
        <!-- Sidebar Gauges/Metrics -->
        <aside class="sidebar-metrics">
            <div class="sidebar-header">
                <img src="https://www.datos.gob.mx/uploads/group/2025-05-19-165211.740585LogoCONASAMApng.png" alt="CONASAMA" class="header-logo">
                <div class="status-indicator">
                    <span class="live-pill"><span class="pulse"></span> LIVE</span>
                </div>
            </div>

            <div class="active-users-section">
                <div class="gauge-container">
                    <canvas id="activeUsersChart"></canvas>
                    <div class="gauge-value">0%</div>
                </div>
                <div class="active-stats">
                    <div class="active-number">0</div>
                    <div class="active-label">Usuarios activos</div>
                </div>
            </div>

            <div class="metric-group">
                <div class="metric-card filter-card" id="card-total" data-filter="total">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <span class="metric-label">Total interacciones</span>
                            <div class="metric-value" id="total-users">0</div>
                        </div>
                        <div class="gender-mini-stats">
                            <div class="gender-item">
                                <span class="gender-icon">👩</span>
                                <span class="gender-count" id="total-women">0</span>
                            </div>
                            <div class="gender-item">
                                <span class="gender-icon">👨</span>
                                <span class="gender-count" id="total-men">0</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="semaphore-group">
                    <div class="semaphore-item alert filter-card" id="card-red" data-filter="red">
                        <div class="icon-circle urgent">🚨</div>
                        <div class="sem-text">
                            <span class="sem-label">Alertas Rojas</span>
                            <span class="sem-value" id="total-emergencies">0</span>
                        </div>
                    </div>
                    <div class="semaphore-item warning filter-card" id="card-orange" data-filter="orange">
                        <div class="icon-circle warning">⚠️</div>
                        <div class="sem-text">
                            <span class="sem-label">Riesgo Alto</span>
                            <span class="sem-value" id="total-atention">0</span>
                        </div>
                    </div>
                    <div class="semaphore-item healthy filter-card" id="card-green" data-filter="green">
                        <div class="icon-circle healthy">✅</div>
                        <div class="sem-text">
                            <span class="sem-label">Riesgo Leve</span>
                            <span class="sem-value" id="total-leve">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button onclick="handleLogout()" class="btn-logout">Cerrar Sesión</button>
            </div>
        </aside>

        <!-- Main Center Area (Map & Timeline) -->
        <section class="main-visualization">
            <header class="main-header">
                <div class="main-title">
                    <h1>CONASAMA | <span>Monitor de salud mental</span></h1>
                </div>
            </header>

            <div class="map-wrapper glass">
                <div class="map-filters">
                    <div class="filter-group">
                        <select id="filter-state" class="form-select filter-select">
                            <option value="">Todos los Estados</option>
                        </select>
                        <select id="filter-municipality" class="form-select filter-select">
                            <option value="">Todos los Municipios</option>
                        </select>
                    </div>
                    <div class="filter-search">
                        <input type="text" id="search-geo" placeholder="Buscar por CP..." class="form-input filter-input">
                    </div>
                </div>
                <div id="riskMap" style="height: 55vh; width: 100%;"></div>
            </div>

            <section class="table-section-footer glass">
                <div class="table-header">
                    <div style="display: flex; align-items: center; gap: 2rem;">
                        <h3>Registros en Tiempo Real</h3>
                        <div class="main-search">
                            <input type="text" id="search-name" placeholder="Buscar por nombre...">
                        </div>
                    </div>
                    <button id="refresh-data" class="btn-refresh">Actualizar</button>
                </div>
                <div class="table-wrapper">
                    <table id="leads-table">
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th>Nombre</th>
                                <th>Edad</th>
                                <th>Sexo</th>
                                <th>Ubicación</th>
                                <th>K10</th>
                                <th>PHQ3</th>
                                <th>Estado</th>
                                <th>Operador</th>
                            </tr>
                        </thead>
                        <tbody id="leads-tbody"></tbody>
                    </table>
                </div>
            </section>

            <section id="admin-panel" class="glass" style="display: none; margin-top: 2rem;">
                <div class="table-header">
                    <h3>Gestión de Operadores y Administradores</h3>
                </div>
                <div class="admin-controls" style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
                    <input type="email" id="new-admin-email" placeholder="Correo del nuevo admin" class="form-input">
                    <select id="new-admin-role" class="form-select">
                        <option value="PS">Psicólogo (PS)</option>
                        <option value="TS">Trabajador Social (TS)</option>
                        <option value="PA">Persona de Apoyo (PA)</option>
                        <option value="master">Administrador Maestro</option>
                        <option value="viewer">Admin de Consulta (Solo ve)</option>
                    </select>
                    <input type="text" id="new-admin-regions" placeholder="Regiones (e.g. CDMX, JAL)" class="form-input">
                    <button id="btn-create-admin" class="btn-option" style="background: var(--accent); color: white;">Crear Acceso</button>
                </div>
                <div class="table-wrapper">
                    <table id="admins-table">
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Regiones</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="admins-tbody"></tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="dashboard.js"></script>
</body>
</html>
