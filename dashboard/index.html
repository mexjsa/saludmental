<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CONASAMA | Estadísticas de Salud Mental</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>

<body class="dashboard-body light-theme">
    <div class="glow-bg"></div>

    <main class="orion-layout">
        <!-- Sidebar Gauges/Metrics -->
        <aside class="sidebar-metrics">
            <div class="nav-brand">
                <div class="brand-header">
                    <img src="https://www.datos.gob.mx/uploads/group/2025-05-19-165211.740585LogoCONASAMApng.png" alt="CONASAMA" class="nav-logo">
                    <span class="live-pill"><span class="pulse"></span> LIVE</span>
                </div>
                <div class="brand-text">
                    <h1>CONASAMA</h1>
                    <span>Monitor de salud mental reportada por usuarios</span>
                </div>
            </div>

            <div class="active-users-section">
                <div class="gauge-container">
                    <canvas id="activeUsersChart"></canvas>
                    <div class="gauge-value">0%</div>
                </div>
                <div class="active-stats">
                    <div class="active-number">0</div>
                    <div class="active-label">Usuarios activos</div>
                </div>
            </div>

            <div class="metric-group">
                <div class="metric-card" id="card-total">
                    <span class="metric-label">Total interacciones</span>
                    <div class="metric-value" id="total-users">0</div>
                </div>
                
                <div class="semaphore-group">
                    <div class="semaphore-item alert">
                        <div class="icon-circle urgent">🚨</div>
                        <div class="sem-text">
                            <span class="sem-label">Alertas Rojas</span>
                            <span class="sem-value" id="total-emergencies">0</span>
                        </div>
                    </div>
                    <div class="semaphore-item warning">
                        <div class="icon-circle warning">⚠️</div>
                        <div class="sem-text">
                            <span class="sem-label">Riesgo Alto</span>
                            <span class="sem-value" id="total-atention">0</span>
                        </div>
                    </div>
                    <div class="semaphore-item healthy">
                        <div class="icon-circle healthy">✅</div>
                        <div class="sem-text">
                            <span class="sem-label">Riesgo Leve</span>
                            <span class="sem-value" id="total-leve">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Center Area (Map & Timeline) -->
        <section class="main-visualization">
            <div class="map-wrapper glass">
                <div class="map-header">
                    <h2>Monitoreo Geográfico Nacional</h2>
                </div>
                <div id="riskMap" style="height: 55vh; width: 100%;"></div>
            </div>



            <section class="table-section-footer glass">
                <div class="table-header">
                    <h3>Registros en Tiempo Real</h3>
                    <button id="refresh-data" class="btn-refresh">Actualizar</button>
                </div>
                <div class="table-wrapper">
                    <table id="leads-table">
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th>Nombre</th>
                                <th>Ubicación</th>
                                <th>K10</th>
                                <th>PHQ3</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="leads-tbody"></tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="dashboard.js"></script>
</body>

</html>
